<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage Monitor</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body class="mode-compact level-ok">
    <!-- COMPACT: a draggable pill -->
    <div id="compact" class="widget pill" data-tauri-drag-region title="點一下展開詳細">
      <span class="live">
        <span class="bolt">⚡</span>
        <span id="c-five" class="pct">—</span>
        <span class="sep">·</span>
        <span id="c-reset" class="reset">⏱ —</span>
        <span id="c-livedot" class="livedot" hidden></span>
        <span id="c-liverate" class="liverate" hidden></span>
      </span>
      <span class="frozen">❄ 請重新登入</span>
    </div>

    <!-- DETAILED: full card -->
    <div id="detailed" class="widget card">
      <div class="card-head" data-tauri-drag-region>
        <span class="title">⚡ Claude</span>
        <span class="head-actions">
          <button id="btn-activity" class="iconbtn" title="即時燒速">🔥</button>
          <button id="btn-settings" class="iconbtn" title="設定">⚙</button>
          <button id="btn-collapse" class="iconbtn" title="精簡模式">⊟</button>
          <button id="btn-hide" class="iconbtn" title="收回系統匣">✕</button>
        </span>
      </div>

      <div class="card-live">
        <div class="meter">
          <div class="meter-row">
            <span class="label">5 小時視窗</span>
            <span id="d-five-pct" class="val">—</span>
          </div>
          <div class="bar"><i id="d-five-bar" class="bar-fill"></i></div>
          <div id="d-five-reset" class="reset small">重置 —</div>
        </div>

        <div class="meter">
          <div class="meter-row">
            <span class="label">每週額度</span>
            <span id="d-seven-pct" class="val">—</span>
          </div>
          <div class="bar"><i id="d-seven-bar" class="bar-fill week"></i></div>
          <div id="d-seven-reset" class="reset small">重置 —</div>
        </div>

        <div id="live-block" class="live-block" hidden>
          <div class="live-head">
            <span class="live-tag"><span class="dot"></span><span id="la-state">活動中</span>
              <span id="la-proj" class="live-proj"></span></span>
          </div>
          <div class="rate-row la-active">
            <span id="la-rate" class="rate-big">—</span><span class="rate-unit">tok/min</span>
          </div>
          <div id="la-empty" class="la-active la-emptyline"></div>
          <svg id="la-spark" class="spark la-active" viewBox="0 0 240 26" preserveAspectRatio="none"></svg>
          <div id="la-sess" class="sess"></div>
        </div>

        <div class="foot">
          <span id="d-today" class="today">今日 — tok</span>
          <span id="d-cost" class="cost">~$0.00</span>
        </div>
        <div id="d-renew" class="renewline">訂閱續訂 —</div>
        <div id="d-error" class="errline" hidden></div>
      </div>

      <div class="card-frozen">
        <div class="frozen-icon">❄</div>
        <div class="frozen-title">Token 已過期</div>
        <div class="frozen-sub">請開啟 Claude Code 重新登入<br>以恢復用量監控</div>
        <button id="btn-frozen-refresh" class="frozen-btn">↻ 已重新登入，立即恢復</button>
        <div id="frozen-hint" class="frozen-hint">自動每 ≤180 秒會重試一次</div>
      </div>
    </div>

    <!-- ACTIVITY: standalone big burn-rate mode -->
    <div id="activity" class="widget card actcard">
      <div class="card-head" data-tauri-drag-region>
        <span class="title">🔥 即時燒速</span>
        <span class="head-actions">
          <button id="btn-act-back" class="iconbtn" title="返回詳細">←</button>
          <button id="btn-act-hide" class="iconbtn" title="收回系統匣">✕</button>
        </span>
      </div>
      <div class="actbody">
        <div class="live-tag"><span class="dot"></span><span id="act-state">活動中</span></div>
        <div id="act-rate" class="act-rate">—</div>
        <div class="act-unit">tok / 分鐘</div>
        <svg id="act-spark" class="spark" viewBox="0 0 180 26" preserveAspectRatio="none"></svg>
        <div id="act-empty" class="la-emptyline"></div>
      </div>
    </div>

    <!-- SETTINGS panel -->
    <div id="settings" class="widget card settings">
      <div class="card-head" data-tauri-drag-region>
        <span class="title">⚙ 設定</span>
        <span class="head-actions">
          <button id="s-done" class="iconbtn" title="完成">✓</button>
        </span>
      </div>

      <label class="srow">渲染風格
        <select id="s-theme">
          <option value="classic">經典</option>
          <option value="arcane">奧術 HUD</option>
          <option value="wizard">魔法羊皮紙</option>
          <option value="neon">魔導霓虹</option>
        </select>
      </label>

      <label class="srow">釘選角落
        <select id="s-corner">
          <option value="tl">左上</option>
          <option value="tr">右上</option>
          <option value="bl">左下</option>
          <option value="br">右下</option>
        </select>
      </label>

      <label class="srow check" title="拖到任何螢幕的任意位置都會記住,不自動吸附角落">
        <input id="s-free-pos" type="checkbox" /> 自由位置（不吸附角落）
      </label>

      <label class="srow">預設模式
        <select id="s-mode">
          <option value="compact">精簡</option>
          <option value="detailed">詳細</option>
          <option value="activity">即時燒速</option>
        </select>
      </label>

      <label class="srow">更新間隔（秒）
        <input id="s-poll" type="number" min="180" step="30" />
      </label>

      <label class="srow">警示門檻 %
        <input id="s-warn" type="number" min="0" max="100" />
      </label>

      <label class="srow">危險門檻 %
        <input id="s-crit" type="number" min="0" max="100" />
      </label>

      <label class="srow" title="你帳單頁「auto renew」日期的「日」，例如 Jun 11 就填 11；0 = 不顯示">帳單日（每月）
        <input id="s-renewal" type="number" min="0" max="31" />
      </label>

      <label class="srow">透明度
        <input id="s-opacity" type="range" min="0.3" max="1" step="0.02" />
      </label>

      <label class="srow check">
        <input id="s-autostart" type="checkbox" /> 開機自動啟動
      </label>

      <label class="srow check">
        <input id="s-effects" type="checkbox" /> 用量增加時顯示火焰特效
      </label>

      <label class="srow check">
        <input id="s-alerts" type="checkbox" /> 達到門檻時警示特效
      </label>

      <label class="srow check">
        <input id="s-activity" type="checkbox" /> 顯示即時活動
      </label>

      <label class="srow check" title="啟用後會在 ~/.claude/settings.json 註冊 statusLine（先備份、不覆蓋既有設定），讓有 session 在跑時即時更新且免打 API">
        <input id="s-statusline" type="checkbox" /> statusline 即時更新
      </label>
      <div id="s-statusline-msg" class="errline" hidden></div>
    </div>
  </body>
</html>
